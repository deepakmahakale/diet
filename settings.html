<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="site.webmanifest">
    <title>Settings - Diet Schedule</title>

    <!-- Icons -->
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <!-- Shared Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Header -->
    <div class="header">
        <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
        <div class="header-title">Settings</div>
    </div>

    <!-- Sidebar Navigation -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
        </div>
        <nav>
            <ul class="sidebar-nav">
                <li><a href="index.html">Schedule</a></li>
                <li><a href="recipes.html">Recipes</a></li>
                <li><a href="settings.html" class="active">Settings</a></li>
            </ul>
        </nav>
    </div>

    <!-- Overlay (for closing sidebar) -->
    <div class="overlay" id="overlay"></div>

    <!-- Main Content -->
    <div class="content">
        <div class="container">
            <h1>Settings</h1>

            <!-- Notifications Section -->
            <div class="settings-section">
                <h2>Meal Notifications</h2>

                <!-- Master Toggle -->
                <div class="setting-item">
                    <div class="setting-info">
                        <h3>Enable Meal Reminders</h3>
                        <p>Get notified for each meal time</p>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notificationsToggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <!-- Permission Status -->
                <div id="permissionStatus" class="status-message hidden"></div>

                <!-- Notification Preview/Test -->
                <div class="test-notification-section">
                    <h3 style="margin-bottom: 10px;">Test Notification</h3>
                    <div class="test-notification-controls">
                        <div class="time-input-group">
                            <label for="testNotificationTime">Schedule for:</label>
                            <input type="time" id="testNotificationTime" class="time-input">
                            <button id="setCurrentTime" class="small-btn" title="Set to current time">Now</button>
                        </div>
                        <button id="testNotification" class="secondary-btn">
                            Schedule Test Notification
                        </button>
                    </div>
                    <div id="testNotificationInfo" class="test-info hidden"></div>
                </div>

                <!-- Individual Meal Controls -->
                <div id="mealTogglesContainer" class="meal-toggles-container hidden">
                    <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Individual Meal Reminders</h3>
                    <div id="mealToggles"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Shared App Functionality -->
    <script src="app.js"></script>
    <script src="notifications.js"></script>
    <script src="settings.js"></script>
</body>

</html>
